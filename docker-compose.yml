name: velara
services:

  build:
    container_name: ${APP_CONTAINER_NAME}
    env_file:
      - .env
    build: 
      context: .
      dockerfile: gemp-module/docker/gemp_app.Dockerfile
    image: gemp_app
    expose:
      - "80"
      - "8080"
    #restart: always
    ports:
        # target means in the container
      - target: 80
        # published is what's on the host machine
        published: "${APP_PORT}"
        #These are the ports used for remote debugging the JRE
      - target: 8000
        published: 8052
    volumes:
       - type: bind
         source: logs
         target: /logs
       - type: bind
         source: replay
         target: /replay
    networks:
      gemp_net_1:
        ipv4_address: ${APP_IP}
    tty: true
    command: java -jar -agentlib:jdwp=transport=dt_socket,address=*:8000,server=y,suspend=n -Dlog4j2.configurationFile=/src/gemp-module/gemp-stccg-client/target/log4j2.xml /src/gemp-module/gemp-stccg-client/target/web.jar &
    secrets:
      - mariadb_client_username
      - mariadb_client_password

  db:
    container_name: ${DB_CONTAINER_NAME}
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
      MARIADB_DATABASE: gemp_db
      MARIADB_USER_FILE: /run/secrets/mariadb_client_username
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_client_password
      MARIADB_AUTO_UPGRADE: true
    build: 
      context: .
      dockerfile: gemp-module/docker/gemp_db.Dockerfile
    image: gemp_db
    ports:
        # target means in the container
      - target: 3306
        # published is what's on the host machine
        published: "${DB_PORT}"
    restart: always
    volumes:
       - type: bind
         source: database
         target: /var/lib/mysql
    networks:
      gemp_net_1:
        ipv4_address: ${DB_IP}
    secrets:
      - mariadb_root_password
      - mariadb_client_username
      - mariadb_client_password

networks:
  gemp_net_1:
    ipam:
      driver: default
      config:
        - subnet: 172.28.1.0/24
    attachable: true

secrets:
  mariadb_root_password:
    file: mariadb_root_password.txt
  mariadb_client_username:
    file: mariadb_client_username.txt
  mariadb_client_password:
    file: mariadb_client_password.txt